<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🔗 链接转二维码 · 下载工具</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(145deg, #f3f5fa 0%, #e9eef4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      padding: 20px;
      margin: 0;
    }

    .card {
      max-width: 560px;
      width: 100%;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: #ffffffec;
      border-radius: 36px;
      box-shadow: 0 25px 45px -10px rgba(0, 20, 50, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.02) inset;
      padding: 28px 26px 32px;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 1.9rem;
      letter-spacing: -0.02em;
      color: #1a2639;
      margin-bottom: 6px;
      padding-left: 4px;
    }

    h1 span {
      background: #1e2b41;
      color: white;
      font-size: 1rem;
      padding: 4px 12px;
      border-radius: 40px;
      margin-left: 8px;
      opacity: 0.75;
      font-weight: 400;
    }

    .sub {
      font-size: 0.95rem;
      color: #54657e;
      margin-bottom: 24px;
      padding-left: 6px;
      border-left: 4px solid #3a7bd5;
      padding-left: 14px;
    }

    .input-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .url-input-wrapper {
      display: flex;
      align-items: center;
      background: #ffffff;
      border-radius: 60px;
      padding: 4px 4px 4px 22px;
      box-shadow: 0 8px 18px -6px rgba(20, 40, 70, 0.12), 0 0 0 1px #d9e0eb inset;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .url-input-wrapper:focus-within {
      box-shadow: 0 8px 22px -6px rgba(58, 123, 213, 0.2), 0 0 0 2px #3a7bd5 inset;
    }

    .url-input-wrapper input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 1.05rem;
      padding: 16px 6px 16px 0;
      color: #121826;
      font-weight: 450;
      min-width: 0;
      width: 100%;
    }

    .url-input-wrapper input::placeholder {
      color: #9aabbf;
      font-weight: 400;
      opacity: 0.7;
    }

    .paste-btn {
      background: #eef2f7;
      border: none;
      border-radius: 40px;
      padding: 10px 18px;
      margin: 4px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #2c3e5c;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #d0dae8;
      white-space: nowrap;
    }

    .paste-btn:hover {
      background: #dee6f0;
      border-color: #b7c3d4;
      color: #0f1a2b;
    }
    .paste-btn:active {
      background: #cdd8e8;
      transform: scale(0.97);
    }

    .action-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      background: #ffffff;
      padding: 14px 24px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      color: #1e2b41;
      cursor: pointer;
      box-shadow: 0 6px 12px -4px rgba(0, 0, 0, 0.05), 0 0 0 1px #cdd9e6 inset;
      transition: all 0.18s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1 1 0;
      backdrop-filter: blur(4px);
      background: rgba(255, 255, 255, 0.8);
    }

    .btn-primary {
      background: #1e2b41;
      color: white;
      box-shadow: 0 10px 18px -6px #1e2b4150, 0 0 0 1px #2e3f5a inset;
      border: none;
    }
    .btn-primary:hover {
      background: #263852;
      transform: translateY(-1px);
      box-shadow: 0 14px 22px -8px #1a2a44;
    }
    .btn-primary:active {
      background: #141f30;
      transform: translateY(2px);
      box-shadow: 0 6px 12px -4px #0f1a2b;
    }

    .btn-outline {
      background: rgba(255,255,255,0.7);
    }
    .btn-outline:hover {
      background: white;
      box-shadow: 0 8px 14px -6px #1e2b4120, 0 0 0 1px #a6b7cf inset;
    }

    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(0.3);
      box-shadow: 0 4px 8px -4px rgba(0,0,0,0.05);
    }

    .qrcode-section {
      background: #ffffffd6;
      border-radius: 28px;
      padding: 22px 20px 18px;
      margin: 20px 0 18px;
      box-shadow: 0 0 0 1px #e2e8f0 inset, 0 12px 24px -14px #1e2b4120;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 230px;
      width: 100%;
      padding: 8px;
    }

    #qrcodeCanvas {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 18px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.03);
      background: white;
      transition: box-shadow 0.2s;
      border: 1px solid #f0f4fa;
    }

    .url-preview {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #4a5f7a;
      background: #edf2f9;
      padding: 8px 18px;
      border-radius: 40px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid #dae2ed;
      width: fit-content;
    }

    .download-area {
      display: flex;
      justify-content: center;
    }

    #downloadBtn {
      min-width: 220px;
      padding: 16px 26px;
      font-size: 1.15rem;
      background: #1f3a5f;
      color: white;
      border: none;
      box-shadow: 0 12px 22px -8px #10233170;
    }

    .footer-note {
      margin-top: 20px;
      font-size: 0.8rem;
      text-align: center;
      color: #62748c;
      display: flex;
      justify-content: center;
      gap: 14px;
    }

    .footer-note button {
      background: none;
      border: none;
      color: #2e4b74;
      font-weight: 500;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1.5px;
      text-decoration-color: #a6bbd0;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 30px;
    }
    .footer-note button:hover {
      background: #e6ecf5;
    }

    .error-message {
      color: #c33c2c;
      font-size: 0.9rem;
      margin-top: 4px;
    }
  </style>
  <!-- 轻量 QR 码生成库 (qrcode-generator) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator/qrcode.min.js"></script>
</head>
<body>
<div class="card">
  <h1>
    ⚡链接转二维码
  </h1>
  <div class="sub">输入网址或任意文本 · 高清PNG</div>

  <div class="input-panel">
    <div class="url-input-wrapper">
      <input type="text" id="urlInput" placeholder="https:// 或 任意文本…" value="https://example.com" autocomplete="off" enterkeyhint="done">
      <button class="paste-btn" id="pasteBtn" title="从剪贴板粘贴">📋 粘贴</button>
    </div>
    <div class="action-group">
      <button class="btn btn-primary" id="generateBtn">✨ 生成二维码</button>
      <button class="btn btn-outline" id="exampleBtn">🔗 示例</button>
    </div>
  </div>

  <div class="qrcode-section">
    <div class="canvas-wrapper">
      <canvas id="qrcodeCanvas" width="300" height="300"></canvas>
    </div>
    <div id="previewText" class="url-preview">https://example.com</div>
  </div>

  <div class="download-area">
    <button class="btn btn-primary" id="downloadBtn" disabled>⬇ 下载二维码 (PNG)</button>
  </div>
  <div class="footer-note">
    <span>🔒 本地生成 · 安全离线</span>
    <button id="clearBtn">清空</button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ----- DOM 元素 -----
    const urlInput = document.getElementById('urlInput');
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const canvas = document.getElementById('qrcodeCanvas');
    const previewDiv = document.getElementById('previewText');
    const pasteBtn = document.getElementById('pasteBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const clearBtn = document.getElementById('clearBtn');

    // 绘图上下文
    const ctx = canvas.getContext('2d');

    // 配置参数
    const CELL_SIZE = 8;          // 每个模块像素大小
    const MARGIN_CELLS = 4;       // 安静区（四周留白模块数）
    const DEFAULT_TEXT = 'https://example.com';

    // 当前是否已生成有效二维码（控制下载按钮）
    let isValidQR = false;

    // ----- 辅助函数：在canvas上显示提示信息（无二维码时）-----
    function drawPlaceholderMessage(message, isWarning = true) {
      // 固定一个舒适的尺寸显示提示
      const w = 320, h = 200;
      canvas.width = w;
      canvas.height = h;
      
      // 清空背景
      ctx.fillStyle = '#f8fafd';
      ctx.fillRect(0, 0, w, h);
      
      // 绘制边框虚线
      ctx.strokeStyle = '#cbd5e1';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([8, 8]);
      ctx.strokeRect(6, 6, w-12, h-12);
      ctx.setLineDash([]);
      
      // 文字
      ctx.font = '500 15px system-ui, -apple-system, sans-serif';
      ctx.fillStyle = isWarning ? '#64748b' : '#2c3e5c';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(message, w/2, h/2 - 6);
      
      ctx.font = '13px system-ui, sans-serif';
      ctx.fillStyle = '#94a3b8';
      ctx.fillText('输入链接后点击「生成」', w/2, h/2 + 22);
      
      // 更新预览区
      if (previewDiv) previewDiv.textContent = '暂无内容';
      
      isValidQR = false;
      downloadBtn.disabled = true;
    }

    // 绘制错误信息 (生成失败时)
    function drawErrorState(errorMsg) {
      const w = 340, h = 200;
      canvas.width = w;
      canvas.height = h;
      ctx.fillStyle = '#fef9f8';
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = '#f1c0b8';
      ctx.lineWidth = 1.8;
      ctx.setLineDash([6, 6]);
      ctx.strokeRect(8, 8, w-16, h-16);
      ctx.setLineDash([]);
      
      ctx.font = '500 15px system-ui, sans-serif';
      ctx.fillStyle = '#b53b2e';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⚠️ 生成失败', w/2, h/2 - 12);
      ctx.font = '13px system-ui';
      ctx.fillStyle = '#956b66';
      ctx.fillText(errorMsg || '内容无效或过长', w/2, h/2 + 16);
      
      if (previewDiv) previewDiv.textContent = '生成错误';
      isValidQR = false;
      downloadBtn.disabled = true;
    }

    // ----- 核心：绘制二维码 (基于文本) -----
    function generateQRCode(text) {
      // 去除首尾空格，但保留内部空格
      const trimmedText = (text || '').trim();
      
      // 空文本处理
      if (trimmedText === '') {
        drawPlaceholderMessage('📝 请输入链接或文本', false);
        if (previewDiv) previewDiv.textContent = '空输入';
        return false;
      }

      try {
        // 使用 qrcode-generator (版本自动，纠错等级 H 高容错)
        const qr = qrcode(0, 'H');   // 0 = 自动选择最小版本
        qr.addData(trimmedText);
        qr.make();

        // 获取模块数量
        const moduleCount = qr.getModuleCount();
        
        // 计算画布尺寸 (模块数 + 2 * margin) * 单元大小
        const canvasSize = (moduleCount + 2 * MARGIN_CELLS) * CELL_SIZE;
        canvas.width = canvasSize;
        canvas.height = canvasSize;

        // 1. 填充白色背景
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvasSize, canvasSize);
        
        // 2. 绘制黑色模块
        ctx.fillStyle = '#101214';  // 近黑，扫描更友好
        
        const offset = MARGIN_CELLS * CELL_SIZE;
        
        for (let row = 0; row < moduleCount; row++) {
          for (let col = 0; col < moduleCount; col++) {
            if (qr.isDark(row, col)) {
              const x = offset + col * CELL_SIZE;
              const y = offset + row * CELL_SIZE;
              ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
            }
          }
        }

        // 可选：加一点点圆角风格？保持清晰不处理
        
        // 更新预览文本 (截断显示)
        const displayText = trimmedText.length > 42 ? trimmedText.slice(0, 42) + '…' : trimmedText;
        if (previewDiv) previewDiv.textContent = `📎 ${displayText}`;
        
        // 标记有效二维码，启用下载
        isValidQR = true;
        downloadBtn.disabled = false;
        
        return true;
      } catch (e) {
        console.warn('二维码生成错误:', e);
        drawErrorState(e.message || '内容无法编码');
        return false;
      }
    }

    // ----- 从输入框取值并生成 -----
    function generateFromInput() {
      const rawValue = urlInput.value;
      // 如果完全是空白，显示占位引导
      if (!rawValue || rawValue.trim() === '') {
        drawPlaceholderMessage('✨ 输入链接开始', false);
        downloadBtn.disabled = true;
        isValidQR = false;
        if (previewDiv) previewDiv.textContent = '等待输入…';
        return;
      }
      generateQRCode(rawValue);
    }

    // ----- 下载二维码 (PNG) -----
    function downloadCanvasAsPNG() {
      if (!isValidQR) {
        // 额外安全：如果失效就不下载
        alert('请先生成有效的二维码');
        return;
      }
      
      try {
        // 创建下载链接
        const link = document.createElement('a');
        // 文件名：包含时间戳避免覆盖，同时使用部分文本前缀
        const rawText = urlInput.value.trim();
        let filePrefix = 'qrcode';
        if (rawText) {
          // 简单清理：替换非字母数字为下划线，取前15字符
          const clean = rawText.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_').slice(0, 20);
          filePrefix = clean || 'qrcode';
        }
        const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
        link.download = `${filePrefix}_${timestamp}.png`;
        
        // 从canvas获取数据
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (err) {
        alert('下载失败，可尝试右键保存');
        console.error(err);
      }
    }

    // ----- 设置示例链接 -----
    function setExampleLink() {
      urlInput.value = 'https://www.deepseek.com/';
      generateFromInput();
    }

    // ----- 清空输入并重置画布 -----
    function clearInputAndCanvas() {
      urlInput.value = '';
      drawPlaceholderMessage('📭 输入新链接', false);
      downloadBtn.disabled = true;
      isValidQR = false;
      if (previewDiv) previewDiv.textContent = '已清空';
      // 让输入框获得焦点
      urlInput.focus();
    }

    // ----- 粘贴功能 (支持剪贴板)-----
    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        if (text) {
          urlInput.value = text;
          generateFromInput();   // 粘贴后立即生成
        } else {
          alert('剪贴板为空');
        }
      } catch (err) {
        // 降级：提示手动粘贴
        alert('无法读取剪贴板，请手动粘贴 (Ctrl+V)');
        urlInput.focus();
      }
    }

    // ----- 初始化 & 默认生成示例二维码 -----
    function initializeDefault() {
      // 确保输入框有默认值
      if (!urlInput.value) {
        urlInput.value = DEFAULT_TEXT;
      }
      // 生成默认二维码
      generateQRCode(urlInput.value);
    }

    // ----- 绑定事件 -----
    function bindEvents() {
      // 生成按钮
      generateBtn.addEventListener('click', (e) => {
        e.preventDefault();
        generateFromInput();
      });

      // 下载按钮
      downloadBtn.addEventListener('click', (e) => {
        e.preventDefault();
        downloadCanvasAsPNG();
      });

      // 输入框支持回车生成
      urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          generateFromInput();
        }
      });

      // 粘贴按钮
      pasteBtn.addEventListener('click', (e) => {
        e.preventDefault();
        pasteFromClipboard();
      });

      // 示例按钮
      exampleBtn.addEventListener('click', (e) => {
        e.preventDefault();
        setExampleLink();
      });

      // 清空按钮
      clearBtn.addEventListener('click', (e) => {
        e.preventDefault();
        clearInputAndCanvas();
      });

      // 可选：如果用户清空输入框后失焦，不做自动生成（保留原样），但可保留之前的码
      // 增加一个输入防误: 不做实时生成, 保持手动控制
    }

    // 页面载入后启动
    window.addEventListener('DOMContentLoaded', () => {
      // 检查 qrcode 库是否存在
      if (typeof qrcode === 'undefined') {
        drawErrorState('库加载失败，请刷新');
        console.error('qrcode-generator 未加载');
        return;
      }
      
      bindEvents();
      initializeDefault();
      
      // 额外：如果初始canvas尺寸异常，重新绘制一次确保
      setTimeout(() => {
        if (urlInput.value) generateQRCode(urlInput.value);
      }, 20);
    });

    // 适应深色/浅色背景保持canvas清晰 —— 无需额外操作
    
    // 暴露部分函数方便调试（非必须）
  })();
</script>
</body>
</html>
